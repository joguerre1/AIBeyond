<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Selección Colombia · Mundial 2026</title>
<style>
  :root {
    --amarillo: #F9C412;
    --amarillo-dark: #C9970A;
    --amarillo-light: #FEF4CE;
    --azul: #003087;
    --azul-light: #E8EEF8;
    --verde: #1A7A4A;
    --verde-light: #E6F5EE;
    --rojo: #CE1126;
    --bg: #F4F4F2;
    --surface: #FFFFFF;
    --text: #111111;
    --text-2: #555555;
    --text-3: #999999;
    --border: #E0E0DC;
    --border-2: #CACAC4;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 50px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--azul);
    padding: 1.25rem 1rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 0.875rem; }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .flag { width: 36px; height: 24px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; flex-shrink: 0; }
  .flag-y { flex: 2; background: #F9C412; }
  .flag-b { flex: 1; background: #003087; }
  .flag-r { flex: 1; background: #CE1126; }
  .brand-text .title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .brand-text .subtitle { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  .clear-btn {
    display: none; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-pill); padding: 6px 12px;
    font-size: 12px; color: rgba(255,255,255,0.85); cursor: pointer;
    white-space: nowrap;
  }
  .clear-btn:active { background: rgba(255,255,255,0.2); }

  /* PROGRESS */
  .progress-area { margin-bottom: 0; }
  .progress-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: rgba(255,255,255,0.65); }
  .progress-count { font-size: 14px; font-weight: 700; color: var(--amarillo); }
  .progress-count.done { color: #4ADE80; }
  .pbar { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; margin-bottom: 0; }
  .pfill { height: 100%; width: 0; border-radius: 2px; background: var(--amarillo); transition: width 0.3s ease; }
  .pfill.done { background: #4ADE80; }

  /* SEARCH */
  .search-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    position: sticky;
    top: 120px;
    z-index: 99;
  }
  .search-inner { position: relative; }
  .search-inner svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); }
  .search-inner input {
    width: 100%; padding: 10px 36px; font-size: 15px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .search-inner input:focus { border-color: var(--azul); }
  .clear-search {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--text-3); border: none; border-radius: 50%;
    width: 18px; height: 18px; display: none; align-items: center; justify-content: center;
    cursor: pointer; color: white; font-size: 11px; font-weight: 700;
  }

  /* LIST */
  .list-container { padding-bottom: 100px; }
  .list-section { }
  .section-label {
    padding: 8px 1rem 6px;
    font-size: 11px; font-weight: 700; color: var(--text-3);
    letter-spacing: 0.08em; text-transform: uppercase;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .player-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    cursor: pointer; min-height: 58px;
    transition: background 0.1s;
    user-select: none;
  }
  .player-row:active { background: #F0F0EE; }
  .player-row.selected { background: var(--verde-light); }
  .player-row.disabled { opacity: 0.35; pointer-events: none; }

  .chk-circle {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    color: var(--text-3); font-size: 14px;
  }
  .player-row.selected .chk-circle {
    background: var(--verde); border-color: var(--verde); color: #fff;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-name { font-size: 15px; color: var(--text); line-height: 1.2; }
  .player-row.selected .player-name { font-weight: 600; color: var(--verde); }

  .order-badge {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--verde); color: #fff;
    font-size: 11px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .player-row.selected .order-badge { display: flex; }

  /* EMPTY STATE */
  .empty {
    padding: 3rem 1rem; text-align: center;
    color: var(--text-3); display: none;
  }
  .empty svg { margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.875rem 1rem;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    z-index: 200;
  }
  .selected-preview {
    display: none; overflow-x: auto; white-space: nowrap;
    padding-bottom: 8px; gap: 6px;
    scrollbar-width: none;
  }
  .selected-preview::-webkit-scrollbar { display: none; }
  .selected-preview.show { display: flex; }
  .preview-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--verde-light); color: var(--verde);
    border-radius: var(--radius-pill); padding: 4px 10px;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .export-btn {
    width: 100%; padding: 16px;
    border-radius: var(--radius);
    font-size: 15px; font-weight: 700;
    border: none; cursor: not-allowed;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--border); color: var(--text-3);
    transition: all 0.2s;
  }
  .export-btn.ready {
    background: var(--amarillo); color: var(--azul);
    cursor: pointer; box-shadow: 0 4px 12px rgba(249,196,18,0.4);
  }
  .export-btn.ready:active { transform: scale(0.98); box-shadow: none; }
  .export-btn svg { flex-shrink: 0; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--azul); color: #fff; padding: 10px 18px;
    border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* DESKTOP */
  @media (min-width: 600px) {
    body { max-width: 480px; margin: 0 auto; }
    body::before {
      content: ''; display: block; position: fixed; inset: 0;
      background: var(--bg); z-index: -1;
    }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="flag">
        <div class="flag-y"></div>
        <div class="flag-b"></div>
        <div class="flag-r"></div>
      </div>
      <div class="brand-text">
        <div class="title">Mi Selección Colombia</div>
        <div class="subtitle">Copa Mundial FIFA 2026 · 55 preconvocados</div>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn" onclick="clearAll()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M12 8v4M12 16h.01"/></svg>
      Limpiar
    </button>
  </div>
  <div class="progress-area">
    <div class="progress-info">
      <span class="progress-label" id="progressLabel">Selecciona 26 jugadores</span>
      <span class="progress-count" id="progressCount">0 / 26</span>
    </div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
  <div style="height:12px"></div>
</header>

<div class="search-bar">
  <div class="search-inner">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Buscar jugador..." oninput="doFilter(this.value)" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="clear-search" id="clearSearch" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="list-container">
  <div id="playerList"></div>
  <div class="empty" id="emptyState">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <p>Ningún jugador encontrado</p>
  </div>
</div>

<div class="bottom-bar">
  <div class="selected-preview" id="preview"></div>
  <button class="export-btn" id="exportBtn" onclick="doExport()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>
    </svg>
    <span id="exportText">Selecciona 26 jugadores para exportar</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAYERS = [
  "Aldair Quintana","Álvaro Angulo","Álvaro Montero","Andrés Mosquera","Andrés Román",
  "Camilo Vargas","Carlos Cuesta","Carlos Gómez","Cristian Borja","Daniel Muñoz",
  "David Ospina","Dávinson Sánchez","Deiver Machado","Edier Ocampo","Edwuin Cetré",
  "Gustavo Puerta","James Rodríguez","Jaminton Campaz","Jefferson Lerma","Jhojan Romaña",
  "Jhon Arias","Jhon Córdoba","Jhon Jáder Durán","Jhon Lucumí","Jhon Solís",
  "Johan Carbonero","Johan Mojica","Johan Rojas","John Steven Mendoza","Jordan Barrera",
  "Jorge Carrascal","Juan Camilo Hernández","Juan Camilo Portilla","Juan David Cabal",
  "Juan Fernando Quintero","Juan Guillermo Cuadrado","Juan Manuel Rengifo","Junior Hernández",
  "Kevin Castaño","Kevin Mier","Kevin Viveros","Luis Díaz","Luis Suárez",
  "Nelson Deossa","Neyser Villarreal","Rafael Santos Borré","Richard Ríos","Santiago Arias",
  "Sebastián Gómez","Sebastián Villa","Willer Ditta","Wílmar Barrios","Yáser Asprilla",
  "Yerry Mina","Yerson Mosquera"
];

let selected = new Set();
let order = [];
let query = "";

const checkSVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

function toggle(name) {
  if (selected.has(name)) {
    selected.delete(name);
    order = order.filter(x => x !== name);
  } else if (selected.size < 26) {
    selected.add(name);
    order.push(name);
  } else {
    showToast("Ya tienes 26 jugadores seleccionados");
    return;
  }
  render();
}

function doFilter(val) {
  query = val;
  document.getElementById('clearSearch').style.display = val ? 'flex' : 'none';
  render();
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  input.value = "";
  doFilter("");
  input.focus();
}

function clearAll() {
  selected.clear();
  order = [];
  render();
}

function render() {
  const filtered = PLAYERS.filter(j => j.toLowerCase().includes(query.toLowerCase()));
  const list = document.getElementById('playerList');
  const empty = document.getElementById('emptyState');
  const n = selected.size;
  const done = n === 26;

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    list.innerHTML = filtered.map(j => {
      const s = selected.has(j);
      const d = n >= 26 && !s;
      const idx = order.indexOf(j) + 1;
      const safeName = j.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return `<div class="player-row${s?' selected':''}${d?' disabled':''}" data-name="${safeName}">
        <div class="chk-circle">${s ? checkSVG : ''}</div>
        <div class="player-info"><div class="player-name">${j}</div></div>
        <div class="order-badge">${idx}</div>
      </div>`;
    }).join('');
  }

  const pfill = document.getElementById('pfill');
  pfill.style.width = Math.min((n/26)*100, 100) + '%';
  pfill.className = 'pfill' + (done ? ' done' : '');

  document.getElementById('progressLabel').textContent = done
    ? '¡Equipo listo para el Mundial!' 
    : `Faltan ${26-n} jugador${26-n!==1?'es':''}`;
  const pc = document.getElementById('progressCount');
  pc.textContent = n + ' / 26';
  pc.className = 'progress-count' + (done ? ' done' : '');

  const clr = document.getElementById('clearBtn');
  clr.style.display = n > 0 ? 'flex' : 'none';

  const preview = document.getElementById('preview');
  if (n > 0) {
    preview.className = 'selected-preview show';
    preview.innerHTML = order.map(j => `<span class="preview-chip">${j.split(' ')[0]}</span>`).join('');
  } else {
    preview.className = 'selected-preview';
    preview.innerHTML = '';
  }

  const btn = document.getElementById('exportBtn');
  const txt = document.getElementById('exportText');
  if (done) {
    btn.className = 'export-btn ready';
    txt.textContent = 'Descargar CSV — 26 jugadores';
  } else {
    btn.className = 'export-btn';
    txt.textContent = n === 0 ? 'Selecciona 26 jugadores para exportar' : `Faltan ${26-n} jugadores para exportar`;
  }
}

function doExport() {
  if (selected.size !== 26) return;
  const rows = ["Nombre Jugador", ...order];
  const csv = '\uFEFF' + rows.join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Colombia_26_Mundial2026.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("CSV descargado correctamente");
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('playerList').addEventListener('click', function(e) {
  const row = e.target.closest('.player-row');
  if (row && !row.classList.contains('disabled')) {
    toggle(row.dataset.name);
  }
});

render();
</script>
</body>
</html>
